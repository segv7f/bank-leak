<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANK - SEGV7F</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Lexend', sans-serif; 
            margin: 0; 
            background-color: #000; 
            color: white;
            overflow-y: auto; 
            min-height: 100vh;
        }

        #video-bg {
            position: fixed; 
            right: 0; 
            bottom: 0; 
            min-width: 100%; 
            min-height: 100%;
            z-index: -1; 
            object-fit: cover; 
            filter: brightness(0.5);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
        }

        .qr-frame {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }

        .success-checkmark { 
            width: 80px; 
            height: 115px; 
            margin: 0 auto; 
        }
        .check-icon {
            width: 80px; 
            height: 80px; 
            position: relative; 
            border-radius: 50%;
            box-sizing: content-box; 
            border: 4px solid #4CAF50;
        }
        .check-icon::after {
            content: ''; 
            position: absolute; 
            top: 23px; 
            left: 15px; 
            width: 45px; 
            height: 22px;
            border-left: 4px solid #4CAF50; 
            border-bottom: 4px solid #4CAF50;
            transform: rotate(-45deg); 
            opacity: 0; 
            animation: checkmark 0.8s ease-in-out forwards;
        }
        @keyframes checkmark {
            0% { height: 0; width: 0; opacity: 1; }
            20% { height: 0; width: 45px; opacity: 1; }
            40% { height: 22px; width: 45px; opacity: 1; }
            100% { height: 22px; width: 45px; opacity: 1; }
        }

        .typing-container {
            display: inline-block;
            vertical-align: middle;
        }
        .typed-text {
            color: #22d3ee;
            font-family: monospace;
            border-right: 2px solid #22d3ee;
            white-space: nowrap;
            overflow: hidden;
            animation: caret 0.8s infinite;
        }
        @keyframes caret {
            50% { border-color: transparent; }
        }

        #generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start p-6">

    <video autoplay loop muted playsinline id="video-bg">
        <source src="https://raw.githubusercontent.com/oibog/bank/main/MIKU%20MUSIC🎶.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="glass-card w-full max-w-lg p-10 text-center my-12">
        
        <div class="mb-8">
            <div class="w-32 h-32 mx-auto rounded-full p-1 bg-gradient-to-tr from-cyan-400 to-blue-500 shadow-2xl mb-5 overflow-hidden border border-white/20">
                <img src="https://sf-static.upanhlaylink.com/img/image_20260301f12355a955a437aa0ab2a22ded040963.jpg" 
                     alt="SEGV7F" class="w-full h-full rounded-full object-cover">
            </div>
            
            <div class="flex items-center justify-center gap-3">
                <h1 class="text-3xl font-extrabold text-white tracking-tight">SEGV7F</h1>
                <img src="https://i.imgur.com/McqzSg1.png" alt="icon" class="w-8 h-8">
            </div>
            
            <p class="text-cyan-400 text-sm mt-3 tracking-widest bg-cyan-500/10 py-1 px-4 rounded-full w-fit mx-auto border border-cyan-500/20 uppercase font-bold">
                <span class="typing-container">
                    <span id="typed-text" class="typed-text"></span>
                </span>
            </p>
        </div>

        <div class="space-y-6 text-left">
            <div>
                <label class="text-[10px] text-gray-400 uppercase font-bold tracking-[0.2em] ml-2">Số tiền chuyển (Tối thiểu 5,000 VNĐ)</label>
                <input type="text" id="amount_input" placeholder="Ví dụ: 100,000" 
                       class="w-full mt-2 bg-white/5 border border-white/10 p-5 rounded-2xl text-white outline-none focus:border-cyan-500 transition-all text-2xl font-bold tracking-wider">
            </div>
            <div>
                <label class="text-[10px] text-gray-400 uppercase font-bold tracking-[0.2em] ml-2">Nội dung chuyển khoản</label>
                <input type="text" id="message" placeholder="BANKLAM123 hoặc bất kỳ nội dung gì" 
                       class="w-full mt-2 bg-white/5 border border-white/10 p-4 rounded-2xl text-white outline-none focus:border-cyan-500 transition-all">
            </div>
            <button id="generate-btn" disabled
                    class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-5 rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest text-sm border border-white/10">
                Xác nhận tạo mã QR
            </button>
        </div>

        <div id="qr-area" class="hidden mt-12 pb-6">
            <div class="qr-frame inline-block transform transition-all duration-500 scale-100">
                <div class="flex justify-between items-center mb-4 px-2">
                    <span class="text-xs font-black text-red-600 italic">VIETQR</span>
                    <span class="text-xs font-black text-blue-900 uppercase">MB BANK</span>
                </div>
                <div class="relative">
                    <img id="qr-code" src="" alt="Mã QR chuyển khoản" class="w-64 h-64 object-contain mx-auto">
                    <div id="qr-loading" class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-xl hidden">
                        <i class="fas fa-spinner fa-spin text-4xl text-cyan-400"></i>
                    </div>
                </div>
                <div class="mt-4 border-t pt-4 flex justify-between px-2 text-[9px] text-gray-400 font-bold tracking-widest">
                    <span>NAPAS 247</span>
                    <span>SEGV7F</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-bg');
        const amountInput = document.getElementById('amount_input');
        const messageInput = document.getElementById('message');
        const generateBtn = document.getElementById('generate-btn');
        const qrArea = document.getElementById('qr-area');
        const qrImg = document.getElementById('qr-code');
        const qrLoading = document.getElementById('qr-loading');

        // Hiệu ứng gõ chữ
        const textElement = document.getElementById("typed-text");
        const phrases = ["segv", "segv", "MB BANK: 01234567891"];
        let phraseIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function typeEffect() {
            const currentPhrase = phrases[phraseIndex];
            if (isDeleting) {
                textElement.textContent = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
            } else {
                textElement.textContent = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
            }

            if (!isDeleting && charIndex === currentPhrase.length) {
                isDeleting = true;
                setTimeout(typeEffect, 1500);
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                phraseIndex = (phraseIndex + 1) % phrases.length;
                setTimeout(typeEffect, 500);
            } else {
                setTimeout(typeEffect, isDeleting ? 50 : 100);
            }
        }
        document.addEventListener("DOMContentLoaded", typeEffect);

        // Format số tiền có dấu phẩy
        amountInput.addEventListener('input', function(e) {
            let value = this.value.replace(/[^0-9]/g, ''); // Chỉ giữ số
            if (value) {
                this.value = Number(value).toLocaleString('vi-VN');
            } else {
                this.value = '';
            }
            updateButtonState();
        });

        messageInput.addEventListener('input', updateButtonState);

        function updateButtonState() {
            const rawAmount = amountInput.value.replace(/[^0-9]/g, '');
            const amount = parseInt(rawAmount) || 0;
            generateBtn.disabled = !(amount >= 5000);
        }

        // Popup chào mừng
        window.onload = function() {
            Swal.fire({
                title: 'Chào mừng!',
                text: 'Bank đi nào! Tối thiểu 5K nhé 😎',
                iconHtml: '<img src="https://sf-static.upanhlaylink.com/img/image_20260301f12355a955a437aa0ab2a22ded040963.jpg" style="width:100%; border-radius:50%">',
                confirmButtonText: 'OK',
                background: '#111',
                color: '#fff',
                allowOutsideClick: false
            }).then((result) => {
                if (result.isConfirmed) {
                    video.muted = false; // Bật tiếng sau khi tương tác
                }
            });
            updateButtonState();
        };

        // Generate QR
        generateBtn.onclick = function() {
            let rawValue = amountInput.value.replace(/[^0-9]/g, '');
            const realAmount = parseInt(rawValue);
            let message = messageInput.value.trim() || "BANKLAM123";
            message = message.replace(/[^a-zA-Z0-9\s]/g, ''); // Làm sạch nội dung

            if (realAmount < 5000) {
                Swal.fire({ 
                    title: 'Số tiền không đủ!', 
                    text: 'Tối thiểu 5,000 VNĐ nhé!', 
                    icon: 'warning', 
                    background: '#111', 
                    color: '#fff' 
                });
                return;
            }

            qrLoading.classList.remove('hidden');
            generateBtn.disabled = true;

            // URL VietQR chuẩn (compact2 đẹp, print thì to hơn)
            const qrUrl = `https://img.vietqr.io/image/MB-01234567891-compact2.png?amount=${realAmount}&addInfo=${encodeURIComponent(message)}&accountName=${encodeURIComponent('SEGV7F')}`;

            qrImg.onload = () => {
                qrLoading.classList.add('hidden');
                qrArea.classList.remove('hidden');
                generateBtn.disabled = false;

                Swal.fire({
                    title: 'Thành công!',
                    html: `<div class="success-checkmark"><div class="check-icon"></div></div><p>Đã tạo QR: ${amountInput.value} VNĐ<br>Nội dung: ${message}</p>`,
                    showConfirmButton: false,
                    timer: 2200,
                    background: '#111', 
                    color: '#fff'
                });

                confetti({ 
                    particleCount: 180, 
                    spread: 120, 
                    origin: { y: 0.6 },
                    colors: ['#00FFFF', '#ffffff', '#0080FF']
                });

                setTimeout(() => {
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                }, 500);
            };

            qrImg.onerror = () => {
                qrLoading.classList.add('hidden');
                generateBtn.disabled = false;
                Swal.fire({
                    title: 'Lỗi!',
                    text: 'Không tải được mã QR. Kiểm tra kết nối và thử lại.',
                    icon: 'error',
                    background: '#111',
                    color: '#fff'
                });
            };

            qrImg.src = qrUrl;
        };
    </script>
</body>
</html>
